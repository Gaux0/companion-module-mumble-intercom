<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="340">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="340" rx="12" fill="url(#bg)"/>
  <rect width="900" height="340" rx="12" stroke="#2a3a4a" stroke-width="1" fill="none"/>
  
  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#e8edf3">Mumble Intercom — Director Console</text>
  <text x="450" y="60" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#7a8a9a">Bitfocus Companion module for broadcast intercom control via Stream Deck</text>
  
  <!-- Stream Deck Box -->
  <rect x="30" y="85" width="220" height="220" rx="10" fill="#1c2530" stroke="#3a4a5a" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8a9aaa" letter-spacing="1">STREAM DECK XL</text>
  
  <!-- Stream Deck Buttons Row 1 -->
  <rect x="48" y="118" width="42" height="42" rx="6" fill="#505050" stroke="#666" stroke-width="0.5"/>
  <text x="69" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">CAM 1</text>
  <text x="69" y="150" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa">MUTED</text>
  
  <rect x="96" y="118" width="42" height="42" rx="6" fill="#00b400" stroke="#00d400" stroke-width="0.5"/>
  <text x="117" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="#000">CAM 2</text>
  <text x="117" y="150" text-anchor="middle" font-family="monospace" font-size="6" fill="#003300">TALKING</text>
  
  <rect x="144" y="118" width="42" height="42" rx="6" fill="#ccaa00" stroke="#eec800" stroke-width="0.5"/>
  <text x="165" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="#000">CAM 3</text>
  <text x="165" y="150" text-anchor="middle" font-family="monospace" font-size="6" fill="#333">WANTS</text>
  
  <rect x="192" y="118" width="42" height="42" rx="6" fill="#b42828" stroke="#d43030" stroke-width="0.5"/>
  <text x="213" y="137" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">CAM 4</text>
  <text x="213" y="150" text-anchor="middle" font-family="monospace" font-size="6" fill="#fcc">OPEN</text>
  
  <!-- Stream Deck Buttons Row 2 -->
  <rect x="48" y="166" width="42" height="42" rx="6" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="69" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#666">CAM 5</text>
  <text x="69" y="198" text-anchor="middle" font-family="monospace" font-size="6" fill="#555">OFFLINE</text>
  
  <rect x="96" y="166" width="42" height="42" rx="6" fill="#505050" stroke="#666" stroke-width="0.5"/>
  <text x="117" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">AUDIO</text>
  <text x="117" y="198" text-anchor="middle" font-family="monospace" font-size="6" fill="#aaa">MUTED</text>
  
  <rect x="144" y="166" width="42" height="42" rx="6" fill="#006400" stroke="#008400" stroke-width="0.5"/>
  <text x="165" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">MUTE</text>
  <text x="165" y="198" text-anchor="middle" font-family="monospace" font-size="6" fill="#cfc">ALL</text>
  
  <rect x="192" y="166" width="42" height="42" rx="6" fill="#960000" stroke="#b40000" stroke-width="0.5"/>
  <text x="213" y="185" text-anchor="middle" font-family="monospace" font-size="7" fill="#fff">OPEN</text>
  <text x="213" y="198" text-anchor="middle" font-family="monospace" font-size="6" fill="#fcc">ALL</text>
  
  <!-- Legend -->
  <rect x="46" y="220" width="10" height="10" rx="2" fill="#1e1e1e" stroke="#444" stroke-width="0.5"/>
  <text x="60" y="229" font-family="system-ui, sans-serif" font-size="8" fill="#7a8a9a">Offline</text>
  <rect x="96" y="220" width="10" height="10" rx="2" fill="#505050" stroke="#666" stroke-width="0.5"/>
  <text x="110" y="229" font-family="system-ui, sans-serif" font-size="8" fill="#7a8a9a">Muted</text>
  <rect x="146" y="220" width="10" height="10" rx="2" fill="#ccaa00" stroke="#eec800" stroke-width="0.5"/>
  <text x="160" y="229" font-family="system-ui, sans-serif" font-size="8" fill="#7a8a9a">Wants Talk</text>
  
  <rect x="46" y="236" width="10" height="10" rx="2" fill="#b42828" stroke="#d43030" stroke-width="0.5"/>
  <text x="60" y="245" font-family="system-ui, sans-serif" font-size="8" fill="#7a8a9a">Open</text>
  <rect x="96" y="236" width="10" height="10" rx="2" fill="#00b400" stroke="#00d400" stroke-width="0.5"/>
  <text x="110" y="245" font-family="system-ui, sans-serif" font-size="8" fill="#7a8a9a">Talking</text>
  
  <!-- Arrow: Stream Deck → Companion -->
  <line x1="260" y1="195" x2="310" y2="195" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4a9eff"/></marker></defs>
  
  <!-- Companion Box -->
  <rect x="315" y="130" width="170" height="130" rx="10" fill="#1c2530" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#4a9eff">Companion</text>
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aaa">mumble-intercom</text>
  <text x="400" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aaa">module</text>
  <text x="400" y="215" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a7a5a">✓ Voice Detection</text>
  <text x="400" y="228" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a7a5a">✓ Server Mute</text>
  <text x="400" y="241" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a7a5a">✓ User Tracking</text>
  
  <!-- Arrow: Companion → Mumble -->
  <line x1="490" y1="180" x2="540" y2="180" stroke="#4a9eff" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#5a8aaa">TLS</text>
  <line x1="490" y1="210" x2="540" y2="210" stroke="#cc8800" stroke-width="2" stroke-dasharray="4,3" marker-start="url(#arrowL)"/>
  <text x="515" y="223" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#aa7700">Voice</text>
  <defs><marker id="arrowL" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 10 0 L 0 5 L 10 10 z" fill="#cc8800"/></marker></defs>
  
  <!-- Mumble Server Box -->
  <rect x="545" y="110" width="160" height="170" rx="10" fill="#1c2530" stroke="#44aa44" stroke-width="1.5"/>
  <text x="625" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#44aa44">Mumble Server</text>
  <text x="625" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#8a9aaa">(Murmur)</text>
  
  <!-- Users in server -->
  <circle cx="580" cy="180" r="10" fill="#00b400" stroke="#00d400" stroke-width="1"/>
  <text x="580" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#000">🎤</text>
  <text x="600" y="183" font-family="system-ui, sans-serif" font-size="8" fill="#8a9aaa">Camera 1</text>
  
  <circle cx="580" cy="205" r="10" fill="#505050" stroke="#666" stroke-width="1"/>
  <text x="580" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#fff">🔇</text>
  <text x="600" y="208" font-family="system-ui, sans-serif" font-size="8" fill="#8a9aaa">Camera 2</text>
  
  <circle cx="580" cy="230" r="10" fill="#b42828" stroke="#d43030" stroke-width="1"/>
  <text x="580" y="233" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#fff">🎤</text>
  <text x="600" y="233" font-family="system-ui, sans-serif" font-size="8" fill="#8a9aaa">Audio Op</text>
  
  <circle cx="580" cy="255" r="10" fill="#1e1e1e" stroke="#444" stroke-width="1"/>
  <text x="580" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#666">✕</text>
  <text x="600" y="258" font-family="system-ui, sans-serif" font-size="8" fill="#555">Camera 3</text>
  
  <!-- Crew icons on the right -->
  <rect x="740" y="110" width="130" height="170" rx="10" fill="#1c2530" stroke="#3a4a5a" stroke-width="1"/>
  <text x="805" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#8a9aaa">Crew (4G/WiFi)</text>
  
  <!-- Connection lines from server to crew -->
  <line x1="710" y1="180" x2="745" y2="163" stroke="#3a5a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="710" y1="205" x2="745" y2="193" stroke="#3a5a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="710" y1="230" x2="745" y2="223" stroke="#3a5a3a" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="710" y1="255" x2="745" y2="253" stroke="#3a3a3a" stroke-width="1" stroke-dasharray="3,3"/>
  
  <text x="805" y="165" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a9a6a">📱 Camera Op 1</text>
  <text x="805" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#6a6a6a">📱 Camera Op 2</text>
  <text x="805" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#9a6a6a">🎧 Audio Op</text>
  <text x="805" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#4a4a4a">📱 Camera Op 3</text>
  
  <!-- Footer -->
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4a5a6a">Open source · MIT License · Zero native dependencies · Works on Windows, macOS, Linux</text>
</svg>
